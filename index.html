<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plataforma Ciberseguridad e IA</title>

<style>
body::before { 
    content:"";
    position: fixed;
    top: 0;
    left:0;
    width: 100%;
    height: 100%;
    background: url('FONDO.jpg');
    filter: blur(6px)brightness(0.8);
    transform: scale(1.1);
    z-index:-1;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

body{ 
    font-family:'Segoe UI'; 
    color:rgb(190, 209, 245);
    text-align:center;
}

.container { 
    max-width:900px; 
    margin:auto; 
    margin-top:20px; 
    backdrop-filter: blur(3px);
    padding:20px; 
    border-radius:20px; 
}

button { 
    margin:10px; 
    padding:12px; 
    width:90%; 
    background:linear-gradient(90deg,#3b82f6,#9333ea); 
    border:none; 
    border-radius:8px; 
    color:white; 
    cursor:pointer; 
}

button:hover { 
    transform:scale(1.05); 
}

.bar { 
    height:12px; 
    background:#bd66f3; 
    width:0%;
}

details { 
    background:#5c18af; 
    padding:10px; 
    margin:5px 0; 
    border-radius:5px; 
    text-align:left; 
}

summary { 
    cursor:pointer; 
    font-weight:bold; 
}
</style>
</head>

<body>

<div class="container">
<h1>🧠 PRIVACODE</h1>

<div id="progress" class="bar"></div>
<p>⭐ Puntos: <span id="score">0</span></p>

<div id="app"></div>
</div>

<script>

// ============================
// ESTADO GLOBAL
// ============================
let state;
const TOTAL_QUESTIONS = 20;

// ============================
// RESET INICIAL
// ============================
function reset(){ 
    state={
        user:null,
        score:0,
        progress:0,
        good:0,
        bad:0,
        currentQuestion:0,
        module:"",
        responses:[],
        modulesCompleted:{}
    }; 
    update();
    intro(); 
}

window.onload = reset;

// ============================
// ACTUALIZAR UI
// ============================
function update(){ 
    document.getElementById("progress").style.width = state.progress + "%"; 
    document.getElementById("score").innerText = state.score; 
}

// ============================
// INTRO
// ============================
function intro(){ 
    document.getElementById("app").innerHTML = `
        <h2>🎬 VIDEO INFORMATIVO</h2>
        <video controls width="70%">
            <source src="video.mp4" type="video/mp4">
        </video>
        <br><br>
        <button onclick="login()">Siguiente</button>
    `;
}

// ============================
// LOGIN
// ============================
function login(){ 
    document.getElementById("app").innerHTML = `
        <h2>🔐 Crear cuenta</h2>
        <input id="name" placeholder="Nombre"><br>
        <input id="email" placeholder="Correo"><br>
        <input id="pass" type="password" placeholder="Contraseña"><br>
        <button onclick="register()">Registrarse</button>
    `; 
}

// ============================
// VALIDACIÓN CORREO
// ============================
function emailValido(email){
    return email.includes("@") && email.includes(".");
}

// ============================
// REGISTRO
// ============================
function register(){ 
    let n=document.getElementById("name").value.trim(); 
    let e=document.getElementById("email").value.trim(); 
    let p=document.getElementById("pass").value.trim(); 
    
    if(!n||!e||!p){ 
        alert("Completa todos los campos"); 
        return; 
    } 

    if(!emailValido(e)){
        alert("Correo no aceptado");
        return;
    }

    state.user=n; 
    dashboard(); 
}

// ============================
// PREGUNTAS
// ============================
const questions = {
    "m1":["Uso de WiFi público",[
        {q:"Estás en una cafetería con WiFi gratis y quieres revisar tu correo. ¿Qué es lo más seguro?", correct:1, options:["Conectarte sin pensar","Usar una VPN","Entrar a cualquier página"]},
        {q:"Quieres pagar algo en línea usando WiFi público. ¿Qué deberías hacer?", correct:2, options:["Pagar rápido","Usar cualquier página","Usar la app oficial del banco"]},
        {q:"Descargas un archivo de internet. ¿Qué es lo correcto?", correct:1, options:["Abrirlo sin revisar","Escanearlo con antivirus","Confiar sin comprobar"]},
        {q:"Aparece una red llamada 'WiFi Gratis'. ¿Qué haces?", correct:1, options:["Conectarte de inmediato","Verificar que sea una red segura","Usarla sin pensar"]},
        {q:"Tu computadora pide actualizarse en un lugar público. ¿Qué haces?", correct:1, options:["Ignorar la actualización","Actualizar usando conexión segura","Actualizar sin importar la red"]}
    ]],
    "m2":["Uso de IA en información",[
        {q:"Una IA te da información rápida para una tarea. ¿Qué debes hacer?", correct:1, options:["Usarla sin revisar","Verificar si es correcta","Entregarla directamente"]},
        {q:"Lees un artículo generado por IA. ¿Qué es lo mejor?", correct:1, options:["Compartirlo de inmediato","Revisar si es confiable","Guardarlo sin leer"]},
        {q:"Una IA te da consejos de inversión. ¿Qué haces?", correct:1, options:["Seguirlos sin pensar","Investigar antes de actuar","Ignorarlos siempre"]},
        {q:"Usas IA para hacer un trabajo. ¿Qué es correcto?", correct:1, options:["Copiar y pegar","Revisar y mejorar el contenido","Entregarlo tal cual"]},
        {q:"La IA detecta algo raro en datos. ¿Qué haces?", correct:1, options:["Ignorarlo","Analizarlo con cuidado","Dejarlo para después"]}
    ]],
    "m3":["Uso correcto de prompts",[
        {q:"Quieres una respuesta precisa de IA. ¿Qué haces?", correct:1, options:["Preguntar algo muy general","Dar instrucciones claras","Escribir poco"]},
        {q:"La IA responde rápido. ¿Qué haces?", correct:1, options:["Aceptar todo","Verificar la información","No leer"]},
        {q:"Quieres resumir un texto. ¿Qué haces?", correct:1, options:["Solo decir 'resume'","Dar instrucciones claras","No explicar nada"]},
        {q:"Buscas ideas creativas. ¿Qué haces?", correct:1, options:["Ser muy general","Dar ejemplos y detalles","Usar una sola palabra"]},
        {q:"La IA da varias soluciones. ¿Qué haces?", correct:1, options:["Elegir la primera","Comparar opciones","Ignorar todo"]}
    ]],
    "m4":["Ética en el uso de IA",[
        {q:"Usas IA en una tarea escolar. ¿Qué es correcto?", correct:1, options:["Ocultarlo","Usarla como apoyo","Depende"]},
        {q:"Publicas contenido hecho con IA. ¿Qué debes hacer?", correct:1, options:["No decir nada","Dar crédito","Publicarlo sin revisar"]},
        {q:"IA te ayuda a escribir un texto. ¿Qué haces?", correct:1, options:["Decir que es tuyo","Revisar y citar","Entregarlo sin cambios"]},
        {q:"Generas código con IA. ¿Qué haces?", correct:1, options:["Copiar sin entender","Revisar y modificar","Solo ejecutarlo"]},
        {q:"La IA sugiere ideas éticas. ¿Qué haces?", correct:1, options:["Ignorarlas","Reflexionar y aplicarlas","No hacer caso"]}
    ]]
};

// ============================
// DASHBOARD
// ============================
function dashboard(){
    update();
    let html=`<h2>👋 Hola ${state.user}</h2>`;
    for(let mod in questions){
        let nombreModulo = questions[mod][0];
        html+=`<button onclick="startModule('${mod}')">${nombreModulo} ${state.modulesCompleted[mod]?'✅ Completado':'▶ Iniciar'}</button>`;
    }
    html+=`<button onclick="final()">🏁 Evaluación final</button>`;
    document.getElementById("app").innerHTML=html;
}

// ============================
// MÓDULOS
// ============================
function startModule(mod){
    if(state.modulesCompleted[mod]){
        alert("Este módulo ya fue completado.");
        return;
    }
    state.module=mod;
    state.currentQuestion=0;
    nextQuestion();
}

function shuffleArray(arr){ 
    return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); 
}

// ============================
// PREGUNTAS ALEATORIAS
// ============================
function nextQuestion(){
    let preguntas = questions[state.module][1];

    if(state.currentQuestion >= preguntas.length){
        state.modulesCompleted[state.module]=true;
        alert("Módulo completado!");
        dashboard();
        return;
    }

    let qObj = preguntas[state.currentQuestion];

    let opciones = qObj.options.map((text, i) => ({
        text: text,
        isCorrect: i === qObj.correct
    }));

    let shuffled = shuffleArray(opciones);

    document.getElementById("app").innerHTML = `
        <h2>${qObj.q}</h2>
        ${shuffled.map(opt => 
            `<button onclick="answer(${opt.isCorrect})">${opt.text}</button>`
        ).join("")}
    `;
}

// ============================
// RESPUESTAS
// ============================
function answer(isCorrect){
    let qObj = questions[state.module][1][state.currentQuestion];
    let puntos = 0;
    let type="bad";

    if(isCorrect){ 
        state.score += 20; 
        state.good++; 
        type="good";
        puntos=20;
    } else { 
        state.score -= 20; 
        state.bad++; 
        puntos=-20;
    }

    state.progress += (100 / TOTAL_QUESTIONS);

    state.responses.push({ 
        module: state.module, 
        question: qObj.q, 
        type: type, 
        answerText: qObj.options[qObj.correct] 
    });

    document.getElementById("app").innerHTML = `
        <h2>${type==="good"?"✅ Buena decisión":"❌ Mala decisión"}</h2>
        <p>Puntos: ${puntos}</p>
        <button onclick="nextAfterFeedback()">Continuar</button>
    `;

    update();
}

function nextAfterFeedback(){
    state.currentQuestion++;
    nextQuestion();
}

// ============================
// FINAL
// ============================
function final(){
    let nivel = state.score>=80?"🏆 Experto":state.score>=40?"🙂 Intermedio":"⚠️ Básico";

    let det = state.responses.map(r=>`
        <details>
        <summary>${r.module} - Correcta: ${r.answerText}</summary>
        <p>${r.question}</p>
        </details>`).join('');

    document.getElementById("app").innerHTML=`
        <h2>📊 Evaluación final</h2>
        <p>${nivel}</p>
        <p>Puntos: ${state.score}</p>
        <p>✔ ${state.good} | ❌ ${state.bad}</p>
        ${det}
        <button onclick="dashboard()">⬅ Volver</button>
        <button onclick="reset()">Reiniciar</button>
    `;
}

</script>

</body>
</html>
